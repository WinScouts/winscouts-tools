<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="Scout2Favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winchester District — Accreditations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #5b2d8e;
  --purple-dark: #3d1a6e;
  --purple-light: #7a4aab;
  --teal: #0d9488;
  --teal-light: #14b8a6;
  --teal-dark: #0f766e;
  --gold: #d97706;
  --bg: #f8f7fc;
  --surface: #ffffff;
  --border: #e5e0f0;
  --text: #1a1033;
  --text-mid: #4b3f6b;
  --text-muted: #8b7aaa;
  --badge-multi: #7c3aed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
  background: linear-gradient(135deg, var(--purple-dark) 0%, var(--purple) 60%, var(--purple-light) 100%);
  color: white; padding: 0;
}
.header-inner {
  max-width: 1200px; margin: 0 auto; padding: 24px 32px 0;
  display: flex; align-items: flex-start; gap: 20px;
}
.header-logo {
  width: 52px; height: 52px; flex-shrink: 0;
  background: rgba(255,255,255,0.15); border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.header-text { flex: 1; }
.header-text h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
.header-text .subtitle { font-size: 0.85rem; opacity: 0.75; margin-top: 2px; }
.header-links { display: flex; gap: 10px; align-items: center; padding-top: 4px; }
.header-links a {
  color: rgba(255,255,255,0.85); font-size: 0.78rem; text-decoration: none;
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  padding: 5px 12px; border-radius: 20px; transition: all 0.15s; white-space: nowrap;
}
.header-links a:hover { background: rgba(255,255,255,0.22); color: white; }
.header-tabs { max-width: 1200px; margin: 0 auto; padding: 16px 32px 0; display: flex; gap: 4px; }
.tab-btn {
  background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.7);
  padding: 8px 20px; border-radius: 8px 8px 0 0;
  font-family: 'DM Sans', sans-serif; font-size: 0.87rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { background: rgba(255,255,255,0.2); color: white; }
.tab-btn.active { background: var(--bg); color: var(--purple); font-weight: 600; }
.export-note {
  max-width: 1200px; margin: 0 auto; padding: 6px 32px;
  font-size: 0.72rem; color: rgba(255,255,255,0.5); text-align: right;
}

.main { max-width: 1200px; margin: 0 auto; padding: 28px 32px 48px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 4px;
}
.stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--purple); line-height: 1; }
.stat-card .stat-label { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-card.teal .stat-value { color: var(--teal); }
.stat-card.gold .stat-value { color: var(--gold); }

.controls {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 16px;
  display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 16px; height: 16px; }
.search-wrap input {
  width: 100%; padding: 8px 12px 8px 34px;
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 0.87rem; color: var(--text);
  background: var(--bg); outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--purple); }
select {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 0.87rem; color: var(--text);
  background: var(--bg); outline: none; cursor: pointer; min-width: 160px;
}
select:focus { border-color: var(--purple); }
.toggle-multi {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  border: 1px solid var(--border); border-radius: 8px; background: var(--bg);
  cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.87rem;
  font-weight: 500; color: var(--text-mid); transition: all 0.15s; white-space: nowrap; user-select: none;
}
.toggle-multi:hover { border-color: var(--text-mid); }
.toggle-multi.active { background: var(--text-mid); color: white; border-color: var(--text-mid); }
.results-count { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; }
.clear-btn {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; color: var(--text-muted); transition: all 0.15s;
}
.clear-btn:hover { border-color: var(--purple); color: var(--purple); }

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
thead th {
  background: var(--purple); color: white; padding: 11px 14px; text-align: left;
  font-weight: 600; font-size: 0.8rem; letter-spacing: 0.03em;
  cursor: pointer; user-select: none; white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
thead th:hover { background: var(--purple-light); }
thead th.sorted-asc::after { content: ' ↑'; }
thead th.sorted-desc::after { content: ' ↓'; }
thead th.roles-col { text-align: center; width: 60px; }

tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f2fc; }
tbody tr.multi-highlight { background: #fafafa; }
tbody tr.multi-highlight:hover { background: #f5f2fc; }

td { padding: 10px 14px; vertical-align: middle; }
td.name-cell { font-weight: 600; color: var(--text); }
td.acc-cell { color: var(--teal-dark); font-weight: 500; }
td.unit-cell { font-size: 0.82rem; color: var(--text-mid); }
td.team-cell { font-size: 0.78rem; color: var(--text-muted); }
td.roles-col { text-align: center; }

/* Subtle pill — muted grey-blue, only visible when >1 */
.roles-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  background: #e8e4f0;
  color: var(--text-mid);
  min-width: 28px;
  text-align: center;
}
.roles-pill.single { background: transparent; color: var(--text-muted); font-weight: 400; }

.acc-chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
.chip-assessor { background: #ecfdf5; color: #065f46; }
.chip-support   { background: #eff6ff; color: #1e40af; }
.chip-training  { background: #fef3c7; color: #92400e; }
.chip-approver  { background: #fce7f3; color: #9d174d; }
.chip-admin     { background: #f3f4f6; color: #374151; }

.no-results { padding: 48px; text-align: center; color: var(--text-muted); font-size: 0.9rem; }

/* BY GROUP */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.group-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.group-badge {
  width: 36px; height: 36px; border-radius: 8px;
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  color: white; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
}
.group-name { font-weight: 600; font-size: 0.9rem; color: var(--text); line-height: 1.3; }
.group-acc-list { display: flex; flex-direction: column; gap: 6px; }
.group-acc-row { display: flex; align-items: center; justify-content: space-between; }
.group-acc-name { font-size: 0.82rem; color: var(--text-mid); }
.group-acc-bar-wrap { flex: 1; margin: 0 10px; height: 6px; background: var(--border); border-radius: 3px; }
.group-acc-bar { height: 6px; border-radius: 3px; }
.group-acc-count { font-size: 0.82rem; font-weight: 600; color: var(--text); min-width: 18px; text-align: right; }
.group-total { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); }
.group-total span { font-weight: 600; color: var(--purple); }

@media (max-width: 768px) {
  .main { padding: 16px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .header-inner { flex-direction: column; gap: 12px; }
}
</style>
</head>

mail": "vicbolton@gmail.com", "phone": "7775725808", "team": "Volunteering Development Team", "acc_count": 2, "profile_url": "https://membership.scouts.org.uk/#/membersearch/d61d0ca8-048c-e23d-28ad-ec08d02dc141/viewmember"}], "stats": {"unique_people": 62, "multi_acc_people": 27, "total_rows": 116, "top_acc": "Disclosure Support Volunteer", "top_acc_count": 49}, "units": ["11th Winchester (Fulflood)", "12th Winchester (Green Jackets)", "14th Winchester (Wonston & Micheldever)", "1st Winchester (Weeke & Harestock)", "3rd Winchester (The Worthies)", "5th Winchester (Compton & Shawford)", "6th Winchester (Abbotts Barton and Hyde)", "7th Winchester (St Cross)", "8th Winchester", "9th Winchester (Colden Common)", "Winchester"], "accreditations": ["Assessor - Nights away (Campsite)", "Assessor - Nights away (Greenfield)", "Data Lead", "Disclosure Support Volunteer", "Leadership Support", "Learning Assessor", "Nights Away Approver", "Recruiter", "Welcome Conversation Volunteer"]};
const ROWS = RAW.rows;
const UNITS = RAW.units;
const ACCS = RAW.accreditations;

function chipClass(acc) {
  if (acc.startsWith('Assessor')) return 'chip-assessor';
  if (acc.includes('Approver')) return 'chip-approver';
  if (['Learning Assessor','First Response Trainer','Trainer'].includes(acc)) return 'chip-training';
  if (['Data Lead','Leadership Support'].includes(acc)) return 'chip-admin';
  return 'chip-support';
}

// Populate filters
const accSel = document.getElementById('accFilter');
ACCS.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; accSel.appendChild(o); });
const unitSel = document.getElementById('unitFilter');
UNITS.forEach(u => { const o = document.createElement('option'); o.value = u; o.textContent = u; unitSel.appendChild(o); });

let sortCol = 0, sortDir = 1, multiOnly = false;

function toggleMulti() {
  multiOnly = !multiOnly;
  document.getElementById('multiToggle').classList.toggle('active', multiOnly);
  filterTable();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('accFilter').value = '';
  document.getElementById('unitFilter').value = '';
  multiOnly = false;
  document.getElementById('multiToggle').classList.remove('active');
  filterTable();
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const accF = document.getElementById('accFilter').value;
  const unitF = document.getElementById('unitFilter').value;
  const rows = document.getElementById('tableBody').querySelectorAll('tr');
  let visible = 0;
  rows.forEach(tr => {
    const cells = tr.querySelectorAll('td');
    const name = cells[0].textContent.toLowerCase();
    const unit = cells[2].textContent.toLowerCase();
    const acc  = cells[3].textContent.toLowerCase();
    const accCount = parseInt(tr.dataset.accCount);
    const matchQ     = !q     || name.includes(q) || unit.includes(q) || acc.includes(q);
    const matchAcc   = !accF  || tr.dataset.acc  === accF;
    const matchUnit  = !unitF || tr.dataset.unit === unitF;
    const matchMulti = !multiOnly || accCount > 1;
    const show = matchQ && matchAcc && matchUnit && matchMulti;
    tr.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('resultsCount').textContent = visible + ' of ' + ROWS.length + ' shown';
  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

function sortTable(col) {
  const ths = document.querySelectorAll('thead th');
  ths.forEach(th => th.classList.remove('sorted-asc','sorted-desc'));
  if (sortCol === col) sortDir = -sortDir; else { sortCol = col; sortDir = 1; }
  ths[col].classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
  const tbody = document.getElementById('tableBody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const aT = a.querySelectorAll('td')[col].dataset.sort || a.querySelectorAll('td')[col].textContent.trim();
    const bT = b.querySelectorAll('td')[col].dataset.sort || b.querySelectorAll('td')[col].textContent.trim();
    // Numeric sort for roles column
    if (col === 1) return (parseInt(bT) - parseInt(aT)) * sortDir;
    return aT.localeCompare(bT) * sortDir;
  });
  rows.forEach(r => tbody.appendChild(r));
  filterTable();
}

function buildTable() {
  const tbody = document.getElementById('tableBody');
  ROWS.forEach(r => {
    const tr = document.createElement('tr');
    tr.dataset.acc = r.accreditation;
    tr.dataset.unit = r.unit;
    tr.dataset.accCount = r.acc_count;
    if (r.acc_count > 1) tr.classList.add('multi-highlight');

    const pillClass = r.acc_count > 1 ? 'roles-pill' : 'roles-pill single';
    const accChip = `<span class="acc-chip ${chipClass(r.accreditation)}">${r.accreditation}</span>`;
    const emailLink = r.email
      ? `<a href="mailto:${r.email}" style="color:var(--teal);text-decoration:none;font-size:0.8rem">${r.email}</a>`
      : '';

    const nameHtml = r.profile_url
      ? `<a href="${r.profile_url}" target="_blank" rel="noopener" style="color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);" onmouseover="this.style.borderBottomColor='var(--purple)'" onmouseout="this.style.borderBottomColor='var(--border)'">${r.first} ${r.last}</a>`
      : `${r.first} ${r.last}`;
    tr.innerHTML = `
      <td class="name-cell">${nameHtml}</td>
      <td class="roles-col" data-sort="${r.acc_count}"><span class="${pillClass}">${r.acc_count}</span></td>
      <td class="unit-cell">${r.unit}</td>
      <td class="acc-cell">${accChip}</td>
      <td class="team-cell">${r.team}</td>
      <td>${emailLink}</td>
    `;
    tbody.appendChild(tr);
  });
  filterTable();
}

// Fixed colour per accreditation type — consistent across all cards
const ACC_COLOURS = {
  'Disclosure Support Volunteer':          '#2563eb',
  'Welcome Conversation Volunteer':        '#0d9488',
  'Learning Assessor':                     '#7c3aed',
  'Recruiter':                             '#d97706',
  'Assessor - Nights away (Campsite)':     '#059669',
  'Assessor - Nights away (Greenfield)':   '#10b981',
  'Nights Away Approver':                  '#dc2626',
  'Data Lead':                             '#db2777',
  'Leadership Support':                    '#6366f1',
};
function accColour(acc) { return ACC_COLOURS[acc] || '#6b7280'; }

function makeGroupCard(label, accs, initial, isDistrict) {
  const total = Object.values(accs).reduce((s,n) => s+n, 0);
  const maxVal = Math.max(...Object.values(accs));
  const card = document.createElement('div');
  card.className = 'group-card';
  if (isDistrict) card.style.cssText = 'border-color:#5b2d8e;border-width:2px;background:#faf8ff;';
  const badgeStyle = isDistrict ? 'background:linear-gradient(135deg,#3d1a6e,#7a4aab);font-size:1rem;' : '';
  const accRows = Object.entries(accs).sort((a,b) => b[1]-a[1]).map(([acc, n]) => {
    const pct = Math.round((n / maxVal) * 100);
    const colour = accColour(acc);
    return `<div class="group-acc-row">
      <span class="group-acc-name">${acc}</span>
      <div class="group-acc-bar-wrap"><div class="group-acc-bar" style="width:${pct}%;background:${colour}"></div></div>
      <span class="group-acc-count">${n}</span>
    </div>`;
  }).join('');
  card.innerHTML = `
    <div class="group-card-header">
      <div class="group-badge" style="${badgeStyle}">${initial}</div>
      <div class="group-name">${label}</div>
    </div>
    <div class="group-acc-list">${accRows}</div>
    <div class="group-total">Total: <span>${total}</span> accreditation${total !== 1 ? 's' : ''}</div>
  `;
  return card;
}

function buildGroups() {
  const grid = document.getElementById('groupGrid');

  // Aggregate by unit
  const byUnit = {};
  ROWS.forEach(r => {
    if (!byUnit[r.unit]) byUnit[r.unit] = {};
    byUnit[r.unit][r.accreditation] = (byUnit[r.unit][r.accreditation] || 0) + 1;
  });

  // District-wide totals
  const districtTotals = {};
  ROWS.forEach(r => {
    districtTotals[r.accreditation] = (districtTotals[r.accreditation] || 0) + 1;
  });

  // District total first, then Winchester, then remaining units alphabetically
  grid.appendChild(makeGroupCard('Winchester District — Total', districtTotals, '∑', true));

  const units = Object.keys(byUnit).sort((a, b) => {
    if (a === 'Winchester') return -1;
    if (b === 'Winchester') return 1;
    const numA = parseInt(a.match(/^\d+/)?.[0] || '999');
    const numB = parseInt(b.match(/^\d+/)?.[0] || '999');
    return numA - numB;
  });
  units.forEach(unit => {
    const initial = unit === 'Winchester' ? 'W' : (unit.match(/\d+/)?.[0] || unit[0]);
    grid.appendChild(makeGroupCard(unit, byUnit[unit], initial, false));
  });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

buildTable();
buildGroups();
document.getElementById('resultsCount').textContent = ROWS.length + ' of ' + ROWS.length + ' shown';
</script>
